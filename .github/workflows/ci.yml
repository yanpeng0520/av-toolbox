name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install system media dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg libsndfile1

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[audio,video,av,dev]"

      - name: Run tests
        env:
          AV_TOOLBOX_CACHE_DIR: ${{ runner.temp }}/av_toolbox_cache
        run: python -m pytest

      - name: Import and CLI smoke
        run: |
          python -c "import av_toolbox; print(len(av_toolbox.list_tools()))"
          av-toolbox list-tools

  docker:
    name: Docker build smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t av-toolbox:ci .

      - name: CLI smoke in image
        run: docker run --rm av-toolbox:ci av-toolbox list-tools
